<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Hexbus Hints</title>
    <style>
        body { font-family: sans-serif; margin: 20px; }
        svg { max-width: 100%; height: auto; display: block; margin: 20px 0; }
        .hex { fill: #ffffff; stroke: #333333; stroke-width: 1px; }
        .hex.axis-highlight { fill: #e0f7fa; stroke: #00acc1; stroke-width: 1.5px; }
        .hex.highlight { fill: #ffeb3b; stroke: #d32f2f; stroke-width: 2px; }
        .hex-text { text-anchor: middle; dominant-baseline: central; font-family: monospace; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
   <h1>Hexbus Puzzle Helper</h1>
    <div id="status-message">Loading...</div>
    
    <div id="grid-container" style="display: none;">
        <svg id="hex-grid" viewBox="-160 -180 320 360"></svg>
    </div>
    
    <div id="hint-container" style="display: none;">
        <p><em>Use the slider to match the board state on your paper, or drag it forward for the next hint.</em></p>
        <input type="range" id="time-slider" style="width: 100%; margin: 15px 0;">
        <p><strong>Step <span id="step-number">0</span>:</strong></p>
        <p id="hint-text"></p>
    </div>
    
    <script>
        let puzzleData = null;
        let baseBoard = new Map(); // Stores the initial puzzle layout coordinates and values

        document.addEventListener('DOMContentLoaded', () => {
            const puzzleId = window.location.search.substring(1);

            if (!puzzleId) {
                document.getElementById('status-message').textContent = "Error: No puzzle ID provided in the URL.";
                return;
            }

            fetch(`data/${puzzleId}.json`)
                .then(response => {
                    if (!response.ok) throw new Error("Puzzle data not found.");
                    return response.json();
                })
                .then(data => {
                    puzzleData = data;
                    
                    // Initialize base board map (including null values for empty cells)
                    puzzleData.board.cells.forEach(c => {
                        baseBoard.set(`${c.q},${c.r}`, c.v);
                    });

                    document.getElementById('status-message').style.display = 'none';
                    document.getElementById('grid-container').style.display = 'block';
                    document.getElementById('hint-container').style.display = 'block';
                    
                    // Setup slider limits based on trace length
                    const slider = document.getElementById('time-slider');
                    slider.min = 0;
                    slider.max = puzzleData.metadata.solver.trace.length;
                    slider.value = 0;
                    
                    // Listen for slider dragging
                    slider.addEventListener('input', (e) => updateBoardState(parseInt(e.target.value, 10)));
                    
                    // Draw initial state
                    updateBoardState(0);
                })
                .catch(error => {
                    document.getElementById('status-message').textContent = error.message;
                });
        });

        function updateBoardState(sliderValue) {
            const trace = puzzleData.metadata.solver.trace;
            const currentBoard = new Map(baseBoard);
            
            // Slider value dictates how many steps from the trace to apply
            for (let i = 0; i < sliderValue; i++) {
                const step = trace[i];
                currentBoard.set(`${step.cell.q},${step.cell.r}`, step.value);
            }

            // Identify the active step (the most recently applied one)
            const activeStep = sliderValue > 0 ? trace[sliderValue - 1] : null;

            if (activeStep) {
                document.getElementById('step-number').textContent = sliderValue;
                document.getElementById('hint-text').textContent = `Look at cell (Q:${activeStep.cell.q}, R:${activeStep.cell.r}). ${activeStep.justification}. Set value to ${activeStep.value}.`;
            } else {
                document.getElementById('step-number').textContent = "0";
                document.getElementById('hint-text').textContent = "Base puzzle layout. Move the slider to begin.";
            }

            drawGrid(currentBoard, activeStep);
        }

        function drawGrid(currentBoard, activeStep) {
            const svg = document.getElementById('hex-grid');
            svg.innerHTML = ''; 
            const size = 15;

            // Iterate over all coordinates from the base board to draw the grid
            baseBoard.forEach((_, key) => {
                const [q, r] = key.split(',').map(Number);
                const displayVal = currentBoard.get(key);
                
                let hexClass = "hex";

                if (activeStep) {
                    const targetQ = activeStep.cell.q;
                    const targetR = activeStep.cell.r;
                    
                    if (q === targetQ && r === targetR) {
                        hexClass = "hex highlight"; // The cell being solved
                    } else if (activeStep.axis === "Q" && q === targetQ) {
                        hexClass = "hex axis-highlight"; // Shares Q axis
                    } else if (activeStep.axis === "R" && r === targetR) {
                        hexClass = "hex axis-highlight"; // Shares R axis
                    } else if (activeStep.axis === "S" && (q + r) === (targetQ + targetR)) {
                        hexClass = "hex axis-highlight"; // Shares S axis (s = -q - r)
                    }
                }
                
                const x = size * 3/2 * r;
                const y = size * Math.sqrt(3) * (q + r/2);

                let points = [];
                for (let i = 0; i < 6; i++) {
                    const angle_deg = 60 * i; 
                    const angle_rad = Math.PI / 180 * angle_deg;
                    points.push(`${x + size * Math.cos(angle_rad)},${y + size * Math.sin(angle_rad)}`);
                }

                const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", points.join(" "));
                polygon.setAttribute("class", hexClass);
                svg.appendChild(polygon);

                if (displayVal !== null) {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x);
                    text.setAttribute("y", y);
                    text.setAttribute("class", "hex-text");
                    text.textContent = displayVal;
                    svg.appendChild(text);
                }
            });
        }
    </script> 

</body>
</html>
