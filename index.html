<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hexbus Hints</title>
    <style>
        body {
            font-family: sans-serif;
            margin: 20px;
            font-size: 16px; /* Base size for readability */
            line-height: 1.4;
        }
        svg { max-width: 100%; height: auto; display: block; margin: 20px 0; }
        .hex { fill: #ffffff; stroke: #333333; stroke-width: 1px; cursor: pointer; }
        .hex.axis-highlight { fill: #e0f7fa; stroke: #00acc1; stroke-width: 1.5px; }
        .hex.highlight { fill: #ffeb3b; stroke: #d32f2f; stroke-width: 2px; }
        .hex-text { text-anchor: middle; dominant-baseline: central; font-family: monospace; font-size: 14px; font-weight: bold; }

        /* Make the slider a better touch target on mobile */
        input[type="range"] {
            width: 100%;
            margin: 15px 0;
            min-height: 40px;
        }
    </style>
</head>
<body>
   <h1>Hexbus Puzzle #<span id="display-id"></span></h1>
    <div id="status-message">Loading...</div>

    <div id="grid-container" style="display: none;">
        <svg id="hex-grid" viewBox="-160 -180 320 360"></svg>
    </div>

    <div id="hint-container" style="display: none;">
        <p><em>Use the slider to match the board state on your paper, or drag it forward for the next hint.</em></p>
        <input type="range" id="time-slider" style="width: 100%; margin: 15px 0;">
        <p><strong>Step <span id="step-number">0</span>:</strong></p>
        <p id="hint-text"></p>
    </div>

    <script>
        let puzzleData = null;
        let baseBoard = new Map();
        let currentSliderValue = 0;
        let clickedHintStep = null; // Tracks a manually clicked cell for hinting

        document.addEventListener('DOMContentLoaded', () => {
            const puzzleId = window.location.search.substring(1);

            if (!puzzleId) {
                document.getElementById('status-message').textContent = "Error: No puzzle ID provided in the URL.";
                return;
            }

            // Set the puzzle number in the header
            document.getElementById('display-id').textContent = puzzleId;

            fetch(`data/${puzzleId}.json`)
                .then(response => {
                    if (!response.ok) throw new Error("Puzzle data not found.");
                    return response.json();
                })
                .then(data => {
                    puzzleData = data;

                    puzzleData.board.cells.forEach(c => {
                        baseBoard.set(`${c.q},${c.r}`, c.v);
                    });

                    document.getElementById('status-message').style.display = 'none';
                    document.getElementById('grid-container').style.display = 'block';
                    document.getElementById('hint-container').style.display = 'block';

                    const slider = document.getElementById('time-slider');
                    slider.min = 0;
                    slider.max = puzzleData.metadata.solver.trace.length;
                    slider.value = 0;

                    // Moving the slider clears the click hint and updates the board
                    slider.addEventListener('input', (e) => {
                        clickedHintStep = null;
                        updateBoardState(parseInt(e.target.value, 10));
                    });

                    updateBoardState(0);
                })
                .catch(error => {
                    document.getElementById('status-message').textContent = error.message;
                });
        });

        function handleHexClick(q, r) {
            // Check if it's an initially provided cell
            if (baseBoard.get(`${q},${r}`) !== null) {
                clickedHintStep = null;
                document.getElementById('hint-text').textContent = `Cell (Q:${q}, R:${r}) is part of the starting puzzle layout.`;
                updateBoardState(currentSliderValue);
                return;
            }

            // Find the step where this cell is solved
            const trace = puzzleData.metadata.solver.trace;
            const stepIndex = trace.findIndex(s => s.cell.q === q && s.cell.r === r);

            if (stepIndex !== -1) {
                clickedHintStep = trace[stepIndex];
                updateBoardState(currentSliderValue); // Re-render with new hint overlay
            }
        }

        function updateBoardState(sliderValue) {
            currentSliderValue = sliderValue;
            const trace = puzzleData.metadata.solver.trace;
            const currentBoard = new Map(baseBoard);

            // Build the board state up to the slider's position
            for (let i = 0; i < sliderValue; i++) {
                const step = trace[i];
                currentBoard.set(`${step.cell.q},${step.cell.r}`, step.value);
            }

            let highlightStep = null;

            if (clickedHintStep) {
                highlightStep = clickedHintStep;
                const isRevealed = trace.indexOf(clickedHintStep) < sliderValue;

                if (isRevealed) {
                    // Cell is already revealed by the slider; show full justification
                    document.getElementById('hint-text').textContent = `Cell (Q:${highlightStep.cell.q}, R:${highlightStep.cell.r}) was solved here. ${highlightStep.justification}`;
                } else {
                    // Cell is NOT revealed; give a nudge without spoiling value or full rule
                    document.getElementById('hint-text').textContent = `Hint: Look along the ${highlightStep.axis}-axis to solve cell (Q:${highlightStep.cell.q}, R:${highlightStep.cell.r}).`;
                }
            } else {
                // Normal slider behavior
                highlightStep = sliderValue > 0 ? trace[sliderValue - 1] : null;
                document.getElementById('step-number').textContent = sliderValue;

                if (highlightStep) {
                    document.getElementById('hint-text').textContent = `Look at cell (Q:${highlightStep.cell.q}, R:${highlightStep.cell.r}). ${highlightStep.justification}. Set value to ${highlightStep.value}.`;
                } else {
                    document.getElementById('hint-text').textContent = "Base puzzle layout. Move the slider to begin.";
                }
            }

            drawGrid(currentBoard, highlightStep);
        }

        function drawGrid(currentBoard, activeStep) {
            const svg = document.getElementById('hex-grid');
            svg.innerHTML = '';
            const size = 15;

            baseBoard.forEach((_, key) => {
                const [q, r] = key.split(',').map(Number);
                const displayVal = currentBoard.get(key);

                let hexClass = "hex";

                // Apply highlighting if there is an active step (from slider or click)
                if (activeStep) {
                    const targetQ = activeStep.cell.q;
                    const targetR = activeStep.cell.r;

                    if (q === targetQ && r === targetR) {
                        hexClass = "hex highlight";
                    } else if (activeStep.axis === "Q" && q === targetQ) {
                        hexClass = "hex axis-highlight";
                    } else if (activeStep.axis === "R" && r === targetR) {
                        hexClass = "hex axis-highlight";
                    } else if (activeStep.axis === "S" && (q + r) === (targetQ + targetR)) {
                        hexClass = "hex axis-highlight";
                    }
                }

                const x = size * 3/2 * r;
                const y = size * Math.sqrt(3) * (q + r/2);

                let points = [];
                for (let i = 0; i < 6; i++) {
                    const angle_deg = 60 * i;
                    const angle_rad = Math.PI / 180 * angle_deg;
                    points.push(`${x + size * Math.cos(angle_rad)},${y + size * Math.sin(angle_rad)}`);
                }

                const polygon = document.createElementNS("http://www.w3.org/2000/svg", "polygon");
                polygon.setAttribute("points", points.join(" "));
                polygon.setAttribute("class", hexClass);
                polygon.addEventListener('click', () => handleHexClick(q, r));
                svg.appendChild(polygon);

                if (displayVal !== null) {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    text.setAttribute("x", x);
                    text.setAttribute("y", y);
                    text.setAttribute("class", "hex-text");
                    text.setAttribute("style", "pointer-events: none;");
                    text.textContent = displayVal;
                    svg.appendChild(text);
                }
            });
        }
    </script>

</body>
</html>
